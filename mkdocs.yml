site_name: Systems Engineering Handbook
site_description: Professional handbook for Systems Engineering with an autonomous infrastructure inspection drone case study
site_url: https://gmorimac-droid.github.io/systems-engineering-handbook/
repo_url: https://github.com/gmorimac-droid/systems-engineering-handbook
repo_name: systems-engineering-handbook
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
#    - content.action.edit
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social: []
  generator: false

extra_css: []
extra_javascript: []

